<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Bank of Uganda DC Monitor">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7F1D1D"/>
      <stop offset="100%" stop-color="#B45309"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>
    <filter id="shield-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Tile background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Heraldic shield silhouette evoking BOU's coat of arms -->
  <g filter="url(#shield-shadow)">
    <path d="M 256 120
             L 380 156
             L 380 296
             Q 380 376 256 420
             Q 132 376 132 296
             L 132 156 Z"
          fill="#0F0A0A"
          stroke="rgba(255,255,255,0.12)"
          stroke-width="2"/>

    <!-- Gold vertical stripe at hoist (BOU heraldic banner element) -->
    <rect x="132" y="156" width="60" height="240" fill="url(#gold)"/>

    <!-- Three "light bulb" circles on the gold stripe -->
    <circle cx="162" cy="200" r="9" fill="#7F1D1D"/>
    <circle cx="162" cy="276" r="9" fill="#7F1D1D"/>
    <circle cx="162" cy="352" r="9" fill="#7F1D1D"/>

    <!-- Horizontal red field (top half of fly) -->
    <rect x="192" y="156" width="188" height="120" fill="#B91C1C"/>

    <!-- Horizontal black field (bottom half of fly) -->
    <rect x="192" y="276" width="188" height="120" fill="#0F0A0A"/>

    <!-- Thin gold divider -->
    <rect x="192" y="273" width="188" height="3" fill="#F59E0B"/>

    <!-- Stylized scales (horizontal bar + two pans) centered over the fly -->
    <g stroke="#F5F0E8" stroke-width="4" stroke-linecap="round" fill="none">
      <line x1="286" y1="216" x2="286" y2="340"/>
      <line x1="232" y1="280" x2="340" y2="280"/>
      <line x1="244" y1="280" x2="244" y2="302"/>
      <line x1="328" y1="280" x2="328" y2="302"/>
      <path d="M 228 302 Q 244 320 260 302" stroke-width="3"/>
      <path d="M 312 302 Q 328 320 344 302" stroke-width="3"/>
      <line x1="268" y1="340" x2="304" y2="340"/>
    </g>
  </g>

  <!-- BOU wordmark beneath shield -->
  <text x="256" y="472"
        text-anchor="middle"
        font-family="'IBM Plex Sans', 'Helvetica Neue', Arial, sans-serif"
        font-weight="700"
        font-size="42"
        fill="#F5F0E8"
        letter-spacing="8">BOU</text>
</svg>
